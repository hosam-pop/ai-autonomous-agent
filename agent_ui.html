<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0b0f1a" />
<title>Local Agent — __MODEL_LABEL__</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css" />
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
<style>
  :root {
    --bg:#0b0f1a; --panel:#0f1629; --panel2:#121a2f; --border:#1f2a44;
    --text:#e6edf7; --muted:#8b98b4; --accent:#6366f1; --accent2:#22c55e;
    --user:#2563eb; --assist:#1e293b; --warn:#f59e0b; --err:#ef4444;
    color-scheme: dark;
  }
  * { box-sizing:border-box; }
  html, body { height:100%; margin:0; }
  body {
    font-family: ui-sans-serif,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;
    background: radial-gradient(1400px 700px at 15% -10%, #1a2246 0%, #0b0f1a 55%) fixed;
    color: var(--text);
    display:grid;
    grid-template-columns: 260px 1fr 400px;
    grid-template-rows: 54px 1fr;
    grid-template-areas: "top top top" "side chat work";
  }
  .topbar {
    grid-area: top; display:flex; align-items:center; gap:14px;
    padding: 0 20px; background: rgba(15,22,41,0.88);
    backdrop-filter: blur(12px); border-bottom:1px solid var(--border);
    position: sticky; top:0; z-index:5;
  }
  .brand { display:flex; align-items:center; gap:10px; font-weight:700; font-size:15px; }
  .brand .logo {
    width:28px; height:28px; border-radius:8px;
    background: linear-gradient(135deg,#6366f1,#22c55e);
    display:flex; align-items:center; justify-content:center; font-weight:800;
  }
  .chip {
    background: var(--panel2); color:var(--muted);
    border:1px solid var(--border); padding:3px 10px; border-radius:999px;
    font-size:11px; white-space:nowrap;
  }
  .chip.ok { color:#86efac; border-color:#14532d; }
  .chip.warn { color:#fcd34d; border-color:#78350f; }
  .chip.err { color:#fca5a5; border-color:#7f1d1d; }
  .spacer { flex:1; }
  .mode {
    display:flex; background: var(--panel); border:1px solid var(--border);
    border-radius:999px; overflow:hidden; font-size:12px;
  }
  .mode button {
    background:transparent; color:var(--muted); border:0; padding:7px 14px;
    cursor:pointer; font:inherit; white-space:nowrap;
  }
  .mode button.active { background: var(--accent); color:#fff; }
  .icon-btn {
    background:transparent; border:1px solid var(--border); color:var(--muted);
    padding:6px 10px; border-radius:8px; cursor:pointer; font:inherit; font-size:12px;
  }
  .icon-btn:hover { color:var(--text); border-color:var(--accent); }

  .sidebar {
    grid-area: side; background: var(--panel); border-inline-end:1px solid var(--border);
    display:flex; flex-direction:column; min-height:0;
  }
  .sidebar .new {
    margin:12px; padding:10px 12px; border:1px dashed var(--border);
    border-radius:10px; color:var(--muted); font-size:13px; cursor:pointer;
    background:transparent; text-align:start;
  }
  .sidebar .new:hover { color:var(--text); border-color:var(--accent); }
  .sect { padding: 2px 14px 4px; font-size:11px; color:var(--muted);
          text-transform:uppercase; letter-spacing:0.06em; }
  .convos { flex:1; overflow-y:auto; padding:0 8px 12px; }
  .convo {
    padding:8px 10px; border-radius:8px; margin-bottom:4px; font-size:13px;
    color:var(--muted); cursor:pointer; border:1px solid transparent;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .convo:hover { background: var(--panel2); color:var(--text); }
  .convo.active { background: var(--panel2); color:var(--text); border-color:var(--border); }
  .mem-list { padding:0 8px 12px; }
  .mem-item {
    padding:6px 10px; border-radius:6px; font-size:11.5px; color:var(--muted);
    cursor:default; margin-bottom:2px;
  }
  .foot { padding:10px 14px; border-top:1px solid var(--border); font-size:11px; color:var(--muted); }

  .chat { grid-area: chat; display:flex; flex-direction:column; min-height:0; }
  #messages {
    flex:1; overflow-y:auto; padding: 22px 28px 14px;
    display:flex; flex-direction:column; gap:14px;
    max-width:920px; margin-inline:auto; width:100%;
  }
  .msg-row { display:flex; gap:12px; align-items:flex-start; }
  .msg-row.user { flex-direction: row-reverse; }
  .avatar {
    width:30px; height:30px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:13px; flex-shrink:0;
  }
  .avatar.user { background: var(--user); color:#fff; }
  .avatar.assistant { background: linear-gradient(135deg,#6366f1,#22c55e); color:#fff; }
  .bubble {
    background: var(--assist); border:1px solid var(--border);
    padding:10px 14px; border-radius:12px; line-height:1.65;
    font-size:14px; max-width:760px;
  }
  .msg-row.user .bubble { background: var(--user); border-color:#1d4ed8; color:#fff; }
  .bubble p:first-child { margin-top:0; } .bubble p:last-child { margin-bottom:0; }
  .bubble pre { direction:ltr; text-align:left; background:#0b1220 !important;
                border-radius:8px; padding:10px; overflow-x:auto; font-size:12.5px; }
  .bubble code { direction:ltr; }
  .msg.system { align-self:center; color:var(--muted); font-size:12px; font-style:italic; text-align:center; }
  .cursor::after { content:"▍"; animation:blink 1s steps(2) infinite; color:var(--muted); margin-inline-start:2px; }
  @keyframes blink { to { visibility:hidden; } }

  form.composer {
    margin: 0 28px 22px; background: var(--panel); border:1px solid var(--border);
    border-radius:14px; padding:10px; display:flex; gap:8px; align-items:flex-end;
    max-width:920px; width: calc(100% - 56px); margin-inline:auto;
  }
  form.composer textarea {
    flex:1; resize:none; min-height:42px; max-height:180px;
    border:0; background:transparent; color:var(--text);
    font:inherit; font-size:14px; outline:none; padding:8px 10px;
  }
  .send {
    background: var(--accent); color:#fff; font-weight:600; border:0;
    border-radius:10px; padding:10px 18px; cursor:pointer;
  }
  .send:disabled { background:#334155; cursor:not-allowed; }

  .work {
    grid-area: work; background: var(--panel); border-inline-start:1px solid var(--border);
    display:flex; flex-direction:column; min-height:0;
  }
  .tabs { display:flex; border-bottom:1px solid var(--border); overflow-x:auto; }
  .tabs button {
    flex:1; min-width:80px; background:transparent; color:var(--muted); border:0;
    padding:10px 10px; cursor:pointer; font:inherit; font-size:12.5px;
    border-bottom:2px solid transparent; white-space:nowrap;
  }
  .tabs button.active { color:var(--text); border-bottom-color: var(--accent); }
  .tabpane { flex:1; overflow-y:auto; padding:12px 14px; display:none; }
  .tabpane.active { display:block; }
  .card {
    background: var(--panel2); border:1px solid var(--border);
    border-radius:10px; padding:10px 12px; margin-bottom:10px; font-size:13px;
  }
  .card .hdr { display:flex; gap:8px; align-items:center; margin-bottom:6px;
               color:var(--muted); font-size:12px; flex-wrap:wrap; }
  .tag { font-size:11px; padding:2px 8px; border-radius:999px; font-weight:600; }
  .tag.plan  { background:#4338ca; color:#e0e7ff; }
  .tag.think { background:#334155; color:#cbd5e1; }
  .tag.act   { background:#312e81; color:#c7d2fe; }
  .tag.obs   { background:#064e3b; color:#bbf7d0; }
  .tag.crit  { background:#7c3aed; color:#ede9fe; }
  .tag.err   { background:#7f1d1d; color:#fecaca; }
  .tag.claw  { background:#7c2d12; color:#fed7aa; }
  .tag.done  { background:#14532d; color:#86efac; }
  pre.mono {
    direction:ltr; text-align:left; background:#0b1220; color:#e2e8f0;
    padding:8px; border-radius:8px; overflow:auto; margin:6px 0;
    font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px;
    white-space:pre-wrap; word-break:break-word; max-height:260px;
  }
  .plan-list { display:flex; flex-direction:column; gap:6px; }
  .plan-item {
    background: var(--panel2); border:1px solid var(--border);
    border-radius:8px; padding:8px 12px; display:flex; gap:8px; align-items:start;
  }
  .plan-item .idx {
    background: var(--border); color:var(--muted); width:22px; height:22px;
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:11px; flex-shrink:0;
  }
  .plan-item.running { border-color: var(--accent); }
  .plan-item.running .idx { background: var(--accent); color:#fff; }
  .plan-item.done { border-color:#14532d; }
  .plan-item.done .idx { background: var(--accent2); color:#0b0f1a; }
  .plan-item .task { flex:1; font-size:13px; line-height:1.5; }
  .plan-item .result { color:var(--muted); font-size:11.5px; margin-top:2px; direction:ltr; }

  .files { display:flex; flex-direction:column; gap:4px; }
  .files .f {
    display:flex; justify-content:space-between; gap:10px; padding:6px 10px;
    border-radius:6px; font-size:12.5px; color:var(--text); cursor:pointer;
    border:1px solid transparent;
  }
  .files .f:hover { background: var(--panel); border-color: var(--border); }
  .files .f .sz { color:var(--muted); font-size:11px; }
  .files .empty { color:var(--muted); font-size:12px; text-align:center; padding:16px; }
  .viewer {
    margin-top:10px; background:#0b1220; border:1px solid var(--border);
    border-radius:8px; overflow:hidden;
  }
  .viewer .vhdr {
    display:flex; justify-content:space-between; align-items:center;
    padding:6px 10px; border-bottom:1px solid var(--border);
    color:var(--muted); font-size:12px; direction:ltr;
  }
  .viewer pre { margin:0; max-height: 320px; font-size:12px; }
  .memcard {
    background: var(--panel2); border:1px solid var(--border);
    border-radius:10px; padding:10px 12px; margin-bottom:8px; font-size:13px;
  }
  .memcard .hdr { display:flex; justify-content:space-between; color:var(--muted); font-size:11px; }
  .memcard .ans { font-size:12.5px; color:var(--text); line-height:1.5; margin-top:4px; }

  @media (max-width: 1100px) {
    body { grid-template-columns: 0 1fr 340px; }
    .sidebar { display:none; }
  }
  @media (max-width: 820px) {
    body { grid-template-columns: 1fr; grid-template-rows: 54px auto 1fr;
           grid-template-areas: "top" "work" "chat"; }
    .sidebar { display:none; }
    .work { max-height:42vh; border-inline-start:0; border-top:1px solid var(--border); }
    #messages { padding:14px; }
    form.composer { margin: 0 10px 12px; width: calc(100% - 20px); }
    .topbar { gap:8px; padding:0 10px; }
    .brand { font-size:13px; }
    .mode button { padding:6px 10px; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><div class="logo">◉</div><div>Local Agent</div></div>
    <span class="chip ok" id="modelChip">__MODEL_LABEL__</span>
    <span class="chip" id="hc">•</span>
    <div class="spacer"></div>
    <div class="mode" style="gap:6px;align-items:center;">
      <select id="laneSel" title="نوع المهمة" style="background:#1b1e25;color:#eaeaf3;border:1px solid #2a2d36;border-radius:8px;padding:6px 10px;font-size:13px;">
        <option value="auto">🤖 تلقائي</option>
        <option value="chat">💬 دردشة</option>
        <option value="aider">💎 كود (Aider)</option>
        <option value="agent">⚡ تنفيذ (ReAct)</option>
        <option value="plan">🧠 خطة + تنفيذ + نقد</option>
      </select>
      <select id="modelSel" title="النموذج" style="background:#1b1e25;color:#eaeaf3;border:1px solid #2a2d36;border-radius:8px;padding:6px 10px;font-size:13px;"></select>
      <button id="m-claw" class="icon-btn" title="Claw Code (بطيء)" style="opacity:.6;">🦀</button>
    </div>
    <button class="icon-btn" id="btnReset" title="مسح الـ workspace">🗑️</button>
  </div>
  <aside class="sidebar">
    <button class="new" id="new-convo">+ محادثة جديدة</button>
    <div class="sect">المحادثات</div>
    <div class="convos" id="convos"></div>
    <div class="sect">ذاكرة المهام</div>
    <div class="mem-list" id="memList"></div>
    <div class="foot">
      Sandbox: <code>/home/ubuntu/agent_workspace</code><br>
      Offline · local-only
    </div>
  </aside>
  <section class="chat">
    <div id="messages"></div>
    <form class="composer" id="f">
      <textarea id="inp" placeholder="اكتب مهمة… (Enter للإرسال، Shift+Enter لسطر جديد)"></textarea>
      <button class="send" id="send" type="submit">تشغيل</button>
    </form>
  </section>
  <aside class="work">
    <div class="tabs">
      <button data-t="activity" class="active">⚙️ Activity</button>
      <button data-t="plan">🗺️ Plan</button>
      <button data-t="files">📁 Files</button>
      <button data-t="memory">🧠 Memory</button>
      <button data-t="logs">📜 Logs</button>
    </div>
    <div class="tabpane active" id="tab-activity"></div>
    <div class="tabpane" id="tab-plan"><div id="planView" class="plan-list"></div></div>
    <div class="tabpane" id="tab-files">
      <div class="files" id="fileList"><div class="empty">لا توجد ملفات بعد</div></div>
      <div class="viewer" id="viewer" style="display:none;">
        <div class="vhdr"><span id="vpath"></span><button id="vclose" class="icon-btn" style="padding:2px 8px;">✕</button></div>
        <pre class="mono" id="vcontent"></pre>
      </div>
    </div>
    <div class="tabpane" id="tab-memory"><div id="memView"></div></div>
    <div class="tabpane" id="tab-logs"><pre class="mono" id="logBox" style="max-height:none;"></pre></div>
  </aside>

<script>
const msgs = document.getElementById('messages');
const act = document.getElementById('tab-activity');
const planView = document.getElementById('planView');
const logBox = document.getElementById('logBox');
const memView = document.getElementById('memView');
const memList = document.getElementById('memList');
const form = document.getElementById('f');
const inp = document.getElementById('inp');
const send = document.getElementById('send');
const hc = document.getElementById('hc');
const fileList = document.getElementById('fileList');
const viewer = document.getElementById('viewer');
const vpath = document.getElementById('vpath');
const vcontent = document.getElementById('vcontent');
const vclose = document.getElementById('vclose');
const btnReset = document.getElementById('btnReset');

marked.setOptions({
  gfm:true, breaks:true,
  highlight: (code, lang) => { try { return hljs.highlight(code,{language: lang||'plaintext'}).value; } catch { return code; } },
});

let mode = 'ask';
let lane = 'auto';
const laneSel = document.getElementById('laneSel');
const modelSel = document.getElementById('modelSel');
laneSel.onchange = () => { lane = laneSel.value; };
document.getElementById('m-claw').onclick = () => {
  mode = (mode === 'claw') ? 'ask' : 'claw';
  document.getElementById('m-claw').style.opacity = (mode === 'claw') ? '1' : '.6';
};

async function refreshModels() {
  try {
    const r = await fetch('/models'); const j = await r.json();
    modelSel.innerHTML = '';
    (j.models||[]).forEach(m => {
      if (!m.available) return;
      const opt = document.createElement('option');
      opt.value = m.id; opt.textContent = m.label + ' · ' + m.ram_gb + 'GB';
      if (m.active) opt.selected = true;
      modelSel.appendChild(opt);
    });
  } catch(e) { console.error(e); }
}
refreshModels();
modelSel.onchange = async () => {
  const chip = document.getElementById('modelChip');
  chip.textContent = 'جاري تبديل النموذج…'; chip.classList.remove('ok');
  try {
    const r = await fetch('/switch_model', {method:'POST', headers:{'content-type':'application/json'},
                                              body: JSON.stringify({model_id: modelSel.value})});
    const j = await r.json();
    if (j.ok) { chip.textContent = j.model.label; chip.classList.add('ok'); }
    else { chip.textContent = 'فشل: '+(j.error||''); }
  } catch(e) { chip.textContent = 'فشل: '+e; }
};

document.querySelectorAll('.tabs button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.tabpane').forEach(x=>x.classList.remove('active'));
    document.getElementById('tab-'+b.dataset.t).classList.add('active');
    if (b.dataset.t === 'files') refreshFiles();
    if (b.dataset.t === 'memory') refreshMemory();
  };
});

let history = [];
const convos = []; let convoIdx = -1;

function esc(s){return (s||'').replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function render(t){ try { return marked.parse(t||''); } catch { return esc(t||''); } }

function addSystem(t){ const d=document.createElement('div'); d.className='msg system'; d.textContent=t; msgs.appendChild(d); }
function addRow(role, html) {
  const row = document.createElement('div'); row.className='msg-row '+role;
  const a = document.createElement('div'); a.className='avatar '+role; a.textContent = role==='user'?'🧑':'🤖';
  const b = document.createElement('div'); b.className='bubble'; b.innerHTML=html;
  row.appendChild(a); row.appendChild(b); msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight; return b;
}
function addCard(tag, title, body){
  const c=document.createElement('div'); c.className='card';
  const h=document.createElement('div'); h.className='hdr';
  const t=document.createElement('span'); t.className='tag '+tag; t.textContent=title;
  h.appendChild(t); c.appendChild(h);
  if (body != null) { const pre=document.createElement('pre'); pre.className='mono'; pre.textContent=body; c.appendChild(pre); }
  act.appendChild(c); act.scrollTop = act.scrollHeight;
  return c;
}
function logLine(s){ logBox.textContent += s+'\n'; logBox.scrollTop = logBox.scrollHeight; }

async function refreshFiles(){
  try {
    const r = await fetch('/files'); const j = await r.json();
    fileList.innerHTML = '';
    const files = j.files || [];
    if (!files.length) { fileList.innerHTML = '<div class="empty">لا توجد ملفات بعد</div>'; return; }
    for (const f of files) {
      const d=document.createElement('div'); d.className='f';
      d.innerHTML = `<span>📄 ${esc(f.path)}</span><span class="sz">${f.size}B</span>`;
      d.onclick = async () => {
        const rr = await fetch('/file?path='+encodeURIComponent(f.path));
        const jj = await rr.json();
        vpath.textContent = f.path;
        vcontent.innerHTML = hljs.highlightAuto(jj.content||'').value;
        viewer.style.display='block';
      };
      fileList.appendChild(d);
    }
  } catch(_){}
}
vclose.onclick = () => { viewer.style.display='none'; };

async function refreshMemory(){
  try {
    const r = await fetch('/memory?limit=30'); const j = await r.json();
    const entries = (j.entries||[]).slice().reverse();
    memView.innerHTML = '';
    memList.innerHTML = '';
    if (!entries.length) { memView.innerHTML = '<div class="empty" style="color:var(--muted);text-align:center;padding:16px;">لا توجد ذاكرة بعد</div>'; return; }
    for (const e of entries) {
      const card = document.createElement('div'); card.className='memcard';
      const when = new Date(e.at*1000).toLocaleString('en-GB');
      const score = e.critique?.score ?? '';
      card.innerHTML = '<div class="hdr"><span>'+esc(when)+'</span><span>score: '+esc(String(score))+' · '+(e.duration_s||0)+'s</span></div>'+
                       '<div><strong>'+esc(e.user_request||'').slice(0,140)+'</strong></div>'+
                       '<div class="ans">'+render((e.critique?.final_answer||'').slice(0,500))+'</div>';
      memView.appendChild(card);
      const li = document.createElement('div'); li.className='mem-item';
      li.textContent = '• '+(e.user_request||'').slice(0,40);
      memList.appendChild(li);
    }
  } catch(_){}
}

btnReset.onclick = async () => {
  if (!confirm('مسح جميع ملفات الـ workspace؟')) return;
  await fetch('/reset', {method:'POST'});
  refreshFiles(); addSystem('تم مسح الـ workspace.');
};

function renderConvos(){
  const el = document.getElementById('convos'); el.innerHTML='';
  convos.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='convo'+(i===convoIdx?' active':'');
    d.textContent = c.title||('محادثة #'+(i+1));
    d.onclick = ()=>loadConvo(i);
    el.appendChild(d);
  });
}
function newConvo(){
  convos.push({title:'', history:[]});
  convoIdx = convos.length-1; history = convos[convoIdx].history;
  msgs.innerHTML=''; act.innerHTML=''; planView.innerHTML=''; logBox.textContent='';
  addSystem('وكيل محلي مستقل. اختر الوضع، ثم اكتب مهمتك.');
  renderConvos();
}
function loadConvo(i){
  convoIdx=i; history=convos[i].history;
  msgs.innerHTML=''; act.innerHTML=''; planView.innerHTML=''; logBox.textContent='';
  for (const t of history) addRow(t.role, render(t.content));
  renderConvos();
}
document.getElementById('new-convo').onclick = newConvo;
newConvo();

async function checkHealth(){
  try {
    const r = await fetch('/healthz'); const j = await r.json();
    hc.textContent = j.ok ? 'backend OK · memory: '+(j.memory_entries||0) : 'backend DOWN';
    hc.className = 'chip '+(j.ok?'ok':'err');
  } catch { hc.textContent='down'; hc.className='chip err'; }
}
checkHealth(); setInterval(checkHealth, 20000);

function renderPlan(tasks){
  planView.innerHTML = '';
  tasks.forEach((t,i)=>{
    const d=document.createElement('div'); d.className='plan-item'; d.dataset.idx=i;
    d.innerHTML = '<div class="idx">'+(i+1)+'</div><div class="task">'+esc(t.task||'')+'<div class="result" data-r></div></div>';
    planView.appendChild(d);
  });
}
function markPlan(idx, state, result){
  const el = planView.querySelector('.plan-item[data-idx="'+idx+'"]');
  if (!el) return;
  el.classList.remove('running','done');
  el.classList.add(state);
  if (result !== undefined) el.querySelector('[data-r]').textContent = result;
}

async function sendMsg(text){
  history.push({role:'user', content:text});
  if (!convos[convoIdx].title) convos[convoIdx].title = text.slice(0,40);
  renderConvos();
  addRow('user', render(text));
  send.disabled = true;
  const assistant = addRow('assistant', '<em style="color:var(--muted)">جاري التفكير…</em>');
  assistant.classList.add('cursor');
  let full = '';
  const url = mode === 'claw' ? '/claw' : '/ask';
  const payload = mode === 'claw'
    ? {message:text, history}
    : {message:text, history, lane};
  try {
    const resp = await fetch(url, {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify(payload),
    });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const {value, done} = await reader.read(); if (done) break;
      buf += dec.decode(value,{stream:true});
      let i;
      while ((i = buf.indexOf('\n\n')) >= 0) {
        const evt = buf.slice(0,i); buf = buf.slice(i+2);
        const lines = evt.split('\n');
        const ev = (lines.find(l=>l.startsWith('event:'))||'').slice(6).trim();
        const da = (lines.find(l=>l.startsWith('data:'))||'').slice(5);
        let p; try { p = JSON.parse(da); } catch { continue; }
        logLine('['+ev+'] '+JSON.stringify(p).slice(0,200));
        if (ev === 'route') {
          const laneName = {chat:'💬 Chat', aider:'💎 Aider', agent:'⚡ ReAct', plan:'🧠 Plan'}[p.lane]||p.lane;
          addCard('plan','🎯 Routed → '+laneName, 'model: '+(p.model_label||p.model));
        }
        else if (ev === 'start') addCard(mode==='claw'?'claw':'plan','● Start · '+mode, JSON.stringify(p,null,2));
        else if (ev === 'phase') addCard('plan','— Phase: '+p.phase, '');
        else if (ev === 'plan') { renderPlan(p.tasks||[]); addCard('plan','🗺️ Plan — '+(p.summary||''), JSON.stringify(p.tasks,null,2)); }
        else if (ev === 'task_start') { markPlan(p.idx,'running'); addCard('plan','▷ Task '+(p.idx+1)+' start', p.task); }
        else if (ev === 'task_done') { markPlan(p.idx,'done', p.result); addCard('done','✓ Task '+(p.idx+1)+' done', p.result); }
        else if (ev === 'thinking') addCard('think','🧠 Thinking'+(p.task!==undefined?' (task '+(p.task+1)+')':'')+' step '+(p.step||''), p.note||'');
        else if (ev === 'action') {
          const tool = (p.action.tool||p.action.action||'?');
          addCard('act','▶ '+tool+(p.task!==undefined?' (task '+(p.task+1)+')':'')+' step '+p.step, JSON.stringify(p.action,null,2));
        }
        else if (ev === 'observation') addCard('obs','✓ obs'+(p.task!==undefined?' (task '+(p.task+1)+')':'')+' step '+p.step, JSON.stringify(p.observation,null,2));
        else if (ev === 'raw') logLine('RAW'+(p.phase?' ['+p.phase+']':'')+': '+(p.text||''));
        else if (ev === 'heartbeat') {
          const m=Math.floor(p.elapsed_s/60), s=Math.round(p.elapsed_s%60);
          assistant.innerHTML = '<div style="color:var(--muted);font-size:13px;"><strong>⏱️ '+(m?m+'m ':'')+s+'s</strong> · Claw قيد التشغيل<br><span style="font-size:11px;direction:ltr;display:block;margin-top:4px;">'+esc(p.stage||'')+'</span></div>';
        }
        else if (ev === 'critique') addCard('crit','🔍 Critique · score '+p.score+' · '+(p.ok?'ok':'needs work'), p.notes||'');
        else if (ev === 'memory') { /* refresh memory tab */ refreshMemory(); }
        else if (ev === 'files') refreshFiles();
        else if (ev === 'claw_payload') addCard('claw','Claw payload', JSON.stringify(p.payload,null,2));
        else if (ev === 'aider_line') addCard('act','💎 aider', p.text||'');
        else if (ev === 'stderr') addCard('err','stderr', p.text||'');
        else if (ev === 'final') { full = p.message||''; assistant.innerHTML = render(full); history.push({role:'assistant', content: full}); }
        else if (ev === 'error') { addCard('err','✗ Error', p.error||'unknown'); if (!full) assistant.innerHTML = '<span style="color:var(--err)">فشل: '+esc(p.error||'unknown')+'</span>'; }
        else if (ev === 'end') { /* done */ }
      }
    }
  } catch (err) {
    assistant.innerHTML = '<span style="color:var(--err)">خطأ: '+esc(err.message)+'</span>';
  } finally {
    assistant.classList.remove('cursor');
    send.disabled = false; inp.focus();
    refreshFiles(); refreshMemory();
  }
}

form.addEventListener('submit', e => {
  e.preventDefault();
  const t = inp.value.trim(); if (!t) return; inp.value='';
  sendMsg(t);
});
inp.addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
inp.focus();
refreshMemory();
</script>
</body></html>
